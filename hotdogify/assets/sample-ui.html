<!doctype html>
<!--
  sample-ui.html — the "hamburger" baseline. A perfectly sensible calculator.
  This is the BEFORE. Point hotdogify at it (or any real UI of your own) and watch
  it get confidently worse. Open in a browser; it actually calculates.
-->
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Calc — sensible edition</title>
<style>
  :root{ --bg:#000; --key:#333; --key2:#a5a5a5; --accent:#ff9f0a; --txt:#fff; }
  *{box-sizing:border-box;margin:0;padding:0;font-family:-apple-system,Inter,system-ui,sans-serif}
  body{background:#1a1a1d;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
  .app{width:360px;background:var(--bg);border-radius:28px;padding:14px;color:var(--txt)}
  .bar{display:flex;justify-content:space-between;align-items:center;padding:6px 8px 2px}
  .menu{width:34px;height:34px;border:none;background:#222;border-radius:8px;color:#fff;
        display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px}
  .display{text-align:right;font-size:64px;font-weight:300;padding:18px 12px 8px;min-height:96px;
           overflow:hidden;text-overflow:ellipsis}
  .sub{text-align:right;color:#888;font-size:18px;padding:0 12px 6px;min-height:24px}
  .grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;padding:8px}
  button.k{height:72px;border:none;border-radius:50%;font-size:26px;color:#fff;background:var(--key);cursor:pointer}
  button.k.fn{background:var(--key2);color:#000}
  button.k.op{background:var(--accent)}
  button.k.zero{grid-column:span 2;border-radius:36px;text-align:left;padding-left:28px}
  button.k:active{filter:brightness(1.3)}
</style>
</head>
<body>
  <div class="app">
    <div class="bar">
      <button class="menu" aria-label="Menu">&#9776;</button> <!-- hamburger: three stacked lines -->
      <span style="color:#666;font-size:13px">sensible edition</span>
    </div>
    <div class="sub" id="sub"></div>
    <div class="display" id="screen">0</div>
    <div class="grid" id="pad">
      <button class="k fn" data-k="AC">AC</button>
      <button class="k fn" data-k="+/-">+/&minus;</button>
      <button class="k fn" data-k="%">%</button>
      <button class="k op" data-k="/">&divide;</button>
      <button class="k" data-k="7">7</button>
      <button class="k" data-k="8">8</button>
      <button class="k" data-k="9">9</button>
      <button class="k op" data-k="*">&times;</button>
      <button class="k" data-k="4">4</button>
      <button class="k" data-k="5">5</button>
      <button class="k" data-k="6">6</button>
      <button class="k op" data-k="-">&minus;</button>
      <button class="k" data-k="1">1</button>
      <button class="k" data-k="2">2</button>
      <button class="k" data-k="3">3</button>
      <button class="k op" data-k="+">+</button>
      <button class="k zero" data-k="0">0</button>
      <button class="k" data-k=".">.</button>
      <button class="k op" data-k="=">=</button>
    </div>
  </div>
<script>
  // Minimal working calculator. The point of the demo is the LAYOUT, so the math stays correct.
  let cur="0", prev=null, op=null, fresh=true;
  const screen=document.getElementById('screen'), sub=document.getElementById('sub');
  const show=()=>{screen.textContent=cur; sub.textContent=(prev!=null&&op)?`${prev} ${op}`:"";};
  const calc=(a,b,o)=>({'+':a+b,'-':a-b,'*':a*b,'/':b?a/b:0})[o];
  document.getElementById('pad').addEventListener('click',e=>{
    const k=e.target.dataset.k; if(!k) return;
    if(/[0-9]/.test(k)){ cur=(fresh||cur==="0")?k:cur+k; fresh=false; }
    else if(k===".") { if(!cur.includes("."))cur+="."; fresh=false; }
    else if(k==="AC"){ cur="0"; prev=null; op=null; fresh=true; }
    else if(k==="+/-"){ cur=String(parseFloat(cur)*-1); }
    else if(k==="%"){ cur=String(parseFloat(cur)/100); }
    else if(k==="="){ if(op!=null&&prev!=null){ cur=String(+calc(prev,parseFloat(cur),op).toFixed(8)); prev=null; op=null; fresh=true; } }
    else { if(op!=null&&prev!=null&&!fresh){ prev=+calc(prev,parseFloat(cur),op).toFixed(8); } else { prev=parseFloat(cur); } op=k; fresh=true; }
    show();
  });
  show();
</script>
</body>
</html>
